# ==========================================================================
# Coach Demetrius Santos — landing estática servida por nginx (EasyPanel/VPS).
# Config de seguridad añadida por la auditoría. Sirve site/v2 (espejo).
#
# NOTA SOBRE LA CSP:
# El sitio carga Tailwind/Alpine/Lucide por CDN, usa <script> y estilos INLINE,
# y Alpine necesita 'unsafe-eval'. Por eso la CSP NO puede ser estricta sin
# romper el sitio. Esta política es "realista": permite exactamente los
# orígenes que el HTML usa hoy y nada más. Si se añade un CDN nuevo, hay que
# añadirlo aquí o el navegador lo bloqueará.
# ==========================================================================

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ----- Cabeceras de seguridad (se aplican a todas las respuestas) -----

    # Evita que el navegador "adivine" tipos MIME (anti MIME-sniffing).
    add_header X-Content-Type-Options "nosniff" always;

    # Anti-clickjacking. frame-ancestors en la CSP es el control moderno;
    # X-Frame-Options cubre navegadores viejos.
    add_header X-Frame-Options "DENY" always;

    # No filtrar la URL completa como referer a terceros.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Desactiva APIs del navegador que este sitio no usa.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # HSTS: fuerza HTTPS durante 1 año. EasyPanel/Let's Encrypt ya sirve TLS.
    # OJO: una vez enviado, el navegador recordará forzar HTTPS este dominio.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content-Security-Policy — ajustada a los orígenes reales del sitio.
    # 'unsafe-inline' y 'unsafe-eval' son necesarios por Tailwind CDN + scripts
    # inline + Alpine. Es la mayor concesión de esta CSP (ver nota arriba).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.fontshare.com; font-src 'self' https://fonts.gstatic.com https://api.fontshare.com data:; img-src 'self' data: https:; connect-src 'self' https://api.web3forms.com; form-action https://api.web3forms.com; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

    # ----- Servir el sitio estático -----
    location / {
        try_files $uri $uri/ =404;
    }

    # No exponer la versión de nginx en las cabeceras.
    server_tokens off;
}
